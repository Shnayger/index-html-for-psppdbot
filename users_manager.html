<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <!-- ВАЖНО: Скрипт должен быть ПЕРВЫМ -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Управление пользователями</title>
    <style>
        /* ваши стили */
    </style>
</head>
<body>
    <!-- ваш HTML -->
    
    <script>
        // ========== ПРОВЕРКА ЗАГРУЗКИ TELEGRAM SDK ==========
        function checkTelegramSDK() {
            if (window.Telegram && window.Telegram.WebApp) {
                addDebugLog('✅ Telegram WebApp SDK загружен успешно');
                initializeApp();
            } else {
                addDebugLog('⏳ Ожидание загрузки Telegram WebApp SDK...', 'info');
                // Повторяем проверку через 100мс
                setTimeout(checkTelegramSDK, 100);
            }
        }
        
        // ========== ИНИЦИАЛИЗАЦИЯ ПРИЛОЖЕНИЯ ==========
        function initializeApp() {
            let tg;
            try {
                tg = window.Telegram.WebApp;
                addDebugLog('✅ Telegram.WebApp найден');
            } catch(e) {
                addDebugLog('❌ Ошибка: Telegram.WebApp не найден! ' + e.message, 'error');
                return;
            }
            
            if (tg) {
                tg.ready();
                addDebugLog('✅ tg.ready() выполнен');
                
                tg.expand();
                addDebugLog('✅ tg.expand() выполнен');
                
                tg.MainButton.hide();
                addDebugLog('✅ MainButton скрыта');
                
                tg.enableClosingConfirmation();
                addDebugLog('✅ Подтверждение закрытия включено');
                
                addDebugLog(`📱 WebApp версия: ${tg.version || 'неизвестна'}`);
                addDebugLog(`📱 Платформа: ${tg.platform || 'неизвестна'}`);
            }
            
            // ========== КНОПКА ЗАКРЫТИЯ ==========
            const closeBtn = document.getElementById('closeBtn');
            if (closeBtn) {
                closeBtn.onclick = function() {
                    addDebugLog('🔴 Нажата кнопка закрытия');
                    if (tg) {
                        tg.close();
                        addDebugLog('✅ Telegram.WebApp.close() выполнен');
                    } else {
                        addDebugLog('⚠️ Telegram.WebApp не доступен, закрываем окно');
                        window.close();
                    }
                };
                addDebugLog('✅ Кнопка закрытия настроена');
            } else {
                addDebugLog('❌ Кнопка закрытия не найдена в DOM');
            }
            
            // ========== ДАННЫЕ ==========
            let usersData = [];
            let changedUsers = new Set();
            let isWaitingResponse = false;
            let pendingAction = null;
            
            // ========== ОТПРАВКА ДАННЫХ БОТУ ==========
            function sendToBot(data) {
                if (!tg) {
                    addDebugLog('❌ Невозможно отправить: Telegram.WebApp не инициализирован', 'error');
                    showStatus(null, '❌ Ошибка соединения с ботом', 'error');
                    return false;
                }
                
                const jsonData = JSON.stringify(data);
                addDebugLog(`📤 Отправка боту: ${jsonData.substring(0, 200)}${jsonData.length > 200 ? '...' : ''}`);
                
                try {
                    tg.sendData(jsonData);
                    addDebugLog('✅ Данные отправлены успешно');
                    isWaitingResponse = true;
                    return true;
                } catch(e) {
                    addDebugLog(`❌ Ошибка отправки: ${e.message}`, 'error');
                    showStatus(null, '❌ Ошибка отправки: ' + e.message, 'error');
                    return false;
                }
            }
            
            // ========== ЗАГРУЗКА ПОЛЬЗОВАТЕЛЕЙ ==========
            function loadUsers() {
                addDebugLog('🔄 Загрузка списка пользователей...');
                showStatus(null, '⏳ Загрузка пользователей...', 'info');
                sendToBot({ action: 'get_users' });
            }
            
            // ========== СОХРАНЕНИЕ ИЗМЕНЕНИЙ ==========
            function saveChanges() {
                addDebugLog(`💾 Попытка сохранения. Изменено пользователей: ${changedUsers.size}`);
                
                if (changedUsers.size === 0) {
                    addDebugLog('⚠️ Нет изменений для сохранения');
                    showStatus(null, 'Нет изменений для сохранения', 'error');
                    return;
                }
                
                const changes = [];
                for (const userId of changedUsers) {
                    const user = usersData.find(u => u.id == userId);
                    if (user) {
                        const newRole = user.new_role || user.role;
                        changes.push({
                            telegram_id: user.id,
                            new_role: newRole
                        });
                        addDebugLog(`📝 Изменение: пользователь ${user.id} (${user.full_name}) -> ${newRole}`);
                    }
                }
                
                addDebugLog(`📦 Отправка ${changes.length} изменений`);
                sendToBot({
                    action: 'save_roles',
                    changes: changes
                });
            }
            
            // ========== ОБРАБОТЧИКИ СОБЫТИЙ ==========
            tg.onEvent('mainButtonClicked', function() {
                addDebugLog('🟢 Нажата главная кнопка (MainButton)');
                saveChanges();
            });
            
            tg.onEvent('viewportChanged', function() {
                addDebugLog('📐 Изменён размер окна');
                tg.expand();
            });
            
            addDebugLog('✅ Обработчики событий Telegram настроены');
            
            // ========== ИЗМЕНЕНИЕ РОЛИ ==========
            window.changeRole = function(userId, newRole) {
                addDebugLog(`🔄 Изменение роли: userId=${userId}, newRole=${newRole}`);
                
                const user = usersData.find(u => u.id == userId);
                if (!user) {
                    addDebugLog(`❌ Пользователь ${userId} не найден`, 'error');
                    return;
                }
                
                addDebugLog(`📋 Текущая роль: ${user.role}, новая: ${newRole}`);
                
                if (user.role !== newRole) {
                    user.new_role = newRole;
                    changedUsers.add(userId);
                    addDebugLog(`✅ Роль изменена, изменённых пользователей: ${changedUsers.size}`);
                    
                    const card = document.getElementById(`card-${userId}`);
                    if (card) {
                        card.style.borderLeft = '3px solid #ff9800';
                    }
                    
                    tg.MainButton.setText(`💾 Сохранить (${changedUsers.size})`);
                    tg.MainButton.show();
                    addDebugLog(`🔘 Главная кнопка показана: "Сохранить (${changedUsers.size})"`);
                } else {
                    addDebugLog(`ℹ️ Роль не изменилась (была ${user.role})`);
                }
            }
            
            // ========== РЕНДЕР ПОЛЬЗОВАТЕЛЕЙ ==========
            function renderUsers(users) {
                addDebugLog(`🎨 Рендер списка пользователей. Получено: ${users ? users.length : 0} записей`);
                
                usersData = users;
                const container = document.getElementById('users-list');
                const statsDiv = document.getElementById('stats');
                
                if (!users || users.length === 0) {
                    addDebugLog('⚠️ Нет пользователей для отображения');
                    container.innerHTML = '<div class="loading">📭 Нет пользователей</div>';
                    statsDiv.innerHTML = '📊 Всего пользователей: 0';
                    return;
                }
                
                statsDiv.innerHTML = `📊 Всего пользователей: ${users.length}`;
                addDebugLog(`📊 Статистика: ${users.length} пользователей`);
                
                let html = '';
                for (const user of users) {
                    const currentRole = user.new_role || user.role;
                    const hasChanges = !!user.new_role;
                    
                    html += `
                        <div class="user-card" id="card-${user.id}" style="border-left: ${hasChanges ? '3px solid #ff9800' : 'none'}">
                            <div class="user-name">${escapeHtml(user.full_name)}</div>
                            <div class="user-org">🏢 ${escapeHtml(user.organization)}</div>
                            <div class="role-buttons">
                                <div class="role-option">
                                    <input type="radio" name="role_${user.id}" id="admin_${user.id}" value="admin" 
                                        ${currentRole === 'admin' ? 'checked' : ''} 
                                        onchange="changeRole(${user.id}, 'admin')">
                                    <label for="admin_${user.id}">👑 Админ</label>
                                </div>
                                <div class="role-option">
                                    <input type="radio" name="role_${user.id}" id="specialist_${user.id}" value="specialist"
                                        ${currentRole === 'specialist' ? 'checked' : ''}
                                        onchange="changeRole(${user.id}, 'specialist')">
                                    <label for="specialist_${user.id}">👨‍💼 Специалист</label>
                                </div>
                                <div class="role-option">
                                    <input type="radio" name="role_${user.id}" id="marker_${user.id}" value="marker"
                                        ${currentRole === 'marker' ? 'checked' : ''}
                                        onchange="changeRole(${user.id}, 'marker')">
                                    <label for="marker_${user.id}">🎯 Маркировщик</label>
                                </div>
                            </div>
                            <div id="status-${user.id}" class="status" style="display: none;"></div>
                        </div>
                    `;
                }
                
                container.innerHTML = html;
                addDebugLog('✅ Список пользователей отрисован');
                
                if (changedUsers.size === 0 && tg) {
                    tg.MainButton.hide();
                    addDebugLog('🔘 Главная кнопка скрыта (нет изменений)');
                }
            }
            
            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            // ========== ОБРАБОТКА ОТВЕТОВ ОТ БОТА ==========
            document.addEventListener('messageFromBot', function(event) {
                const data = event.detail;
                addDebugLog(`📨 Получено событие messageFromBot: ${JSON.stringify(data).substring(0, 300)}`);
                handleBotResponse(data);
            });
            
            window.handleBotResponse = function(data) {
                addDebugLog(`📨 Вызвана window.handleBotResponse с данными: ${JSON.stringify(data).substring(0, 300)}`);
                handleBotResponse(data);
            };
            
            tg.onEvent('popupClosed', function() {
                addDebugLog('🪟 Popup закрыт');
            });
            
            function handleBotResponse(data) {
                isWaitingResponse = false;
                addDebugLog(`🔄 Обработка ответа, action: ${data.action || 'неизвестно'}`);
                
                if (data.action === 'users_list') {
                    addDebugLog(`📋 Получен список пользователей (${data.users ? data.users.length : 0} записей)`);
                    if (data.users && data.users.length > 0) {
                        addDebugLog(`📋 Пример: ${JSON.stringify(data.users[0])}`);
                    }
                    renderUsers(data.users);
                    showStatus(null, `✅ Загружено ${data.users ? data.users.length : 0} пользователей`, 'success');
                    
                } else if (data.action === 'save_result') {
                    addDebugLog(`💾 Результат сохранения: success=${data.success}, saved=${data.saved}, errors=${data.errors}`);
                    if (data.success) {
                        showStatus(null, `✅ Сохранено ${data.saved} изменений`, 'success');
                        changedUsers.clear();
                        tg.MainButton.hide();
                        addDebugLog('🔘 Изменения сохранены, главная кнопка скрыта');
                        setTimeout(() => loadUsers(), 1000);
                    } else {
                        showStatus(null, `❌ Ошибка: ${data.error || 'неизвестная ошибка'}`, 'error');
                    }
                } else {
                    addDebugLog(`⚠️ Неизвестный action: ${data.action}`);
                }
            }
            
            // ========== ТАЙМАУТ ==========
            setTimeout(() => {
                if (isWaitingResponse) {
                    addDebugLog('⚠️ Таймаут: нет ответа от бота более 10 секунд', 'error');
                    showStatus(null, '⚠️ Нет ответа от бота. Проверьте соединение.', 'error');
                    isWaitingResponse = false;
                    
                    const container = document.getElementById('users-list');
                    if (container && container.innerHTML.includes('Загрузка')) {
                        container.innerHTML = `
                            <div class="loading">
                                ⚠️ Нет ответа от бота<br>
                                <button class="retry-btn" onclick="loadUsers()">🔄 Повторить</button>
                            </div>
                        `;
                    }
                }
            }, 10000);
            
            // ========== СТАРТ ==========
            addDebugLog('🚀 Приложение запущено, запрос списка пользователей...');
            loadUsers();
            
            addDebugLog(`📱 User Agent: ${navigator.userAgent}`);
            addDebugLog(`📱 Screen size: ${window.innerWidth}x${window.innerHeight}`);
        }
        
        // ========== ЛОГГЕР ==========
        let debugMessages = [];
        
        function addDebugLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logMessage = `[${timestamp}] ${message}`;
            debugMessages.push(logMessage);
            
            const debugLogElement = document.getElementById('debugLog');
            if (debugLogElement) {
                debugLogElement.textContent = debugMessages.join('\n');
                const panel = document.getElementById('debugPanel');
                if (panel) panel.scrollTop = panel.scrollHeight;
            }
            console.log(logMessage);
        }
        
        function showStatus(cardId, message, type) {
            addDebugLog(`Статус [${type}]: ${message} (cardId: ${cardId || 'глобальный'})`);
            
            if (cardId) {
                const statusDiv = document.getElementById(`status-${cardId}`);
                if (statusDiv) {
                    statusDiv.textContent = message;
                    statusDiv.className = `status ${type}`;
                    statusDiv.style.display = 'block';
                    setTimeout(() => {
                        if (statusDiv) statusDiv.style.display = 'none';
                    }, 3000);
                }
            } else {
                const statsDiv = document.getElementById('stats');
                const originalHtml = statsDiv.innerHTML;
                statsDiv.innerHTML = message;
                statsDiv.className = `stats ${type}`;
                setTimeout(() => {
                    statsDiv.innerHTML = originalHtml;
                    statsDiv.className = 'stats';
                }, 3000);
            }
        }
        
        // ========== ЗАПУСК ПРОВЕРКИ ==========
        addDebugLog('🟢 Инициализация приложения...');
        checkTelegramSDK();
    </script>
</body>
</html>
